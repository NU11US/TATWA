<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tatwa">
<meta name="application-name" content="Tatwa">
<link rel="manifest" href="data:application/json,{
  &quot;name&quot;: &quot;Reloj Tatwa&quot;,
  &quot;short_name&quot;: &quot;Tatwa&quot;,
  &quot;display&quot;: &quot;standalone&quot;,
  &quot;orientation&quot;: &quot;portrait&quot;,
  &quot;background_color&quot;: &quot;#050508&quot;,
  &quot;theme_color&quot;: &quot;#050508&quot;,
  &quot;start_url&quot;: &quot;.&quot;,
  &quot;icons&quot;: [{
    &quot;src&quot;: &quot;data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' fill='%23050508'/%3E%3Cellipse cx='256' cy='256' rx='180' ry='120' stroke='%239333ea' stroke-width='18' fill='%231a0a2e'/%3E%3Ccircle cx='256' cy='256' r='40' fill='%239333ea' opacity='0.8'/%3E%3C/svg%3E&quot;,
    &quot;sizes&quot;: &quot;512x512&quot;,
    &quot;type&quot;: &quot;image/svg+xml&quot;,
    &quot;purpose&quot;: &quot;any maskable&quot;
  }]
}">
<meta name="theme-color" content="#050508">
<title>Reloj Tatwa</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Cinzel+Decorative:wght@400;700&family=IM+Fell+English+SC&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #050508;
    --border:  rgba(255,255,255,0.08);
    --dim:     rgba(255,255,255,0.3);
    --white:   rgba(255,255,255,0.85);
    --current: #ffffff;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--white);
    font-family: 'IM Fell English SC', serif;
    overflow-y: auto;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    background-size: 150px;
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative; z-index: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100dvh;
    padding: 1rem 1rem 1.5rem;
    gap: 0;
  }

  /* En pantallas muy pequeñas reducir espacios y simbolo */
  @media (max-height: 700px) {
    .simbolo-wrap {
      width: clamp(70px, 22vw, 110px) !important;
      height: clamp(70px, 22vw, 110px) !important;
      margin-bottom: 0.6rem !important;
    }
    .hora { font-size: clamp(2rem, 11vw, 3.5rem) !important; }
    .nombre { font-size: clamp(1rem, 5vw, 1.6rem) !important; }
    .sep, .sep2 { margin: 0.5rem 0 !important; }
    .titulo { margin-bottom: 0.2rem !important; }
    .amanecer { margin-bottom: 0.5rem !important; }
    .cualidades { margin-bottom: 0.5rem !important; }
    .progreso-wrap { margin-bottom: 0.3rem !important; }
  }

  .titulo {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(1.1rem, 5vw, 1.4rem);
    letter-spacing: 0.35em;
    color: var(--dim);
    margin-bottom: 0.5rem;
  }

  .hora {
    font-family: 'Cinzel', serif;
    font-size: clamp(2.8rem, 14vw, 5rem);
    font-weight: 900;
    letter-spacing: 0.05em;
    color: var(--current);
    text-shadow: 0 0 40px color-mix(in srgb, var(--current) 40%, transparent);
    line-height: 1;
    transition: color 1s, text-shadow 1s;
  }

  .fecha {
    font-family: 'Cinzel', serif;
    font-size: clamp(1rem, 4.5vw, 1.3rem);
    letter-spacing: 0.18em;
    color: var(--dim);
    margin-top: 0.3rem;
  }

  .amanecer {
    font-size: clamp(0.95rem, 4vw, 1.2rem);
    letter-spacing: 0.15em;
    color: rgba(251,191,36,0.55);
    margin-top: 0.15rem;
    margin-bottom: 1rem;
  }

  .sep {
    width: min(300px, 78vw);
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--current), transparent);
    opacity: 0.15;
    margin-bottom: 1.2rem;
    transition: background 1s;
  }

  /* ── Símbolo ── */
  .simbolo-wrap {
    width: clamp(100px, 32vw, 150px);
    height: clamp(100px, 32vw, 150px);
    position: relative;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 1.1rem;
  }

  .simbolo-wrap svg {
    width: 100%; height: 100%;
    filter: drop-shadow(0 0 16px color-mix(in srgb, var(--current) 55%, transparent));
    transition: filter 1s;
  }

  .anillo {
    position: absolute; inset: -14px;
    border-radius: 50%;
    border: 1px solid color-mix(in srgb, var(--current) 18%, transparent);
    animation: girar 50s linear infinite;
    transition: border-color 1s;
  }
  .anillo2 {
    position: absolute; inset: -6px;
    border-radius: 50%;
    border: 1px dashed color-mix(in srgb, var(--current) 10%, transparent);
    animation: girar 30s linear infinite reverse;
    transition: border-color 1s;
  }

  @keyframes girar { to { transform: rotate(360deg); } }

  /* ── Textos ── */
  .nombre {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(1.3rem, 6.5vw, 2rem);
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--current);
    text-shadow: 0 0 28px color-mix(in srgb, var(--current) 35%, transparent);
    transition: color 1s, text-shadow 1s;
    margin-bottom: 0.2rem;
  }

  .elemento {
    font-size: clamp(1rem, 4.5vw, 1.3rem);
    letter-spacing: 0.22em;
    color: var(--dim);
    margin-bottom: 0.12rem;
  }

  .cualidades {
    font-size: clamp(0.95rem, 4vw, 1.2rem);
    letter-spacing: 0.16em;
    color: color-mix(in srgb, var(--current) 42%, transparent);
    transition: color 1s;
    margin-bottom: 1rem;
  }

  /* ── Progreso ── */
  .progreso-wrap {
    width: min(290px, 78vw);
    margin-bottom: 0.5rem;
  }

  .progreso-label {
    display: flex; justify-content: space-between;
    font-size: clamp(0.92rem, 3.8vw, 1.15rem);
    letter-spacing: 0.14em;
    color: var(--dim);
    margin-bottom: 0.35rem;
  }

  .progreso-bg {
    width: 100%; height: 2px;
    background: rgba(255,255,255,0.07);
    border-radius: 2px; overflow-y: auto;
  }

  .progreso-fill {
    height: 100%;
    background: var(--current);
    border-radius: 2px;
    box-shadow: 0 0 6px var(--current);
    transition: width 1s linear, background 1s, box-shadow 1s;
  }

  /* ── Consejo ── */
  .sep2 {
    width: min(290px, 78vw);
    height: 1px;
    background: var(--border);
    margin: 0.9rem 0 0.7rem;
  }

  .consejo {
    width: min(290px, 78vw);
    font-size: clamp(0.95rem, 4vw, 1.2rem);
    letter-spacing: 0.1em;
    line-height: 1.8;
    color: var(--dim);
    text-align: center;
  }

  @keyframes aparecer {
    from { opacity: 0; transform: scale(0.8) rotate(-5deg); }
    to   { opacity: 1; transform: scale(1) rotate(0deg); }
  }
  .cambio { animation: aparecer 0.7s cubic-bezier(0.34,1.56,0.64,1); }
</style>
</head>
<body>
<div class="app">

  <div class="titulo">✦ Reloj Tatwa ✦</div>

  <div class="hora" id="hora">--:--:--</div>
  <div class="fecha" id="fecha"></div>
  <div class="amanecer" id="amanecer">☀ Obteniendo amanecer...</div>

  <div class="sep"></div>

  <div class="simbolo-wrap" id="simboloWrap">
    <div class="anillo"></div>
    <div class="anillo2"></div>
  </div>

  <div class="nombre" id="nombre">—</div>
  <div class="elemento" id="elemento"></div>
  <div class="cualidades" id="cualidades"></div>

  <div class="progreso-wrap">
    <div class="progreso-label">
      <span>Ciclo</span>
      <span id="restante">--m --s</span>
    </div>
    <div class="progreso-bg">
      <div class="progreso-fill" id="progFill" style="width:0%"></div>
    </div>
  </div>

  <div class="sep2"></div>
  <div class="consejo" id="consejo"></div>

</div>

<script>
// ── Tatwas con símbolos tradicionales SVG ─────────────────────
const TATWAS = [
  {
    nombre:    "AKASHA",
    elemento:  "Muerte",
    cualidades:"",
    consejo:   "Favorable: meditación y oración. Evitar: negocios y citas amorosas, fracasarán.",
    color:     "#9333ea",
    // Óvalo negro con borde púrpura — símbolo tradicional del Muerte
    svg: `<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="50" cy="50" rx="38" ry="26"
        fill="#1a0a2e" stroke="#9333ea" stroke-width="3"/>
      <ellipse cx="50" cy="50" rx="28" ry="18"
        fill="#2d1060" stroke="#9333ea" stroke-width="1" opacity="0.5"/>
      <ellipse cx="50" cy="50" rx="10" ry="6"
        fill="#9333ea" opacity="0.7"/>
    </svg>`,
  },
  {
    nombre:    "VAYU",
    elemento:  "Aire",
    cualidades:"",
    consejo:   "Favorable: negocios rápidos y trabajo intelectual. Evitar: decisiones importantes, favorece el engaño y accidentes.",
    color:     "#22d3ee",
    // Círculo azul — símbolo tradicional del Aire
    svg: `<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="50" r="38"
        fill="#0c2a3a" stroke="#22d3ee" stroke-width="3"/>
      <circle cx="50" cy="50" r="26"
        fill="#0e3a50" stroke="#22d3ee" stroke-width="1" opacity="0.5"/>
      <circle cx="50" cy="50" r="10"
        fill="#22d3ee" opacity="0.75"/>
    </svg>`,
  },
  {
    nombre:    "TEJAS",
    elemento:  "Fuego",
    cualidades:"",
    consejo:   "Favorable: trabajo intenso, ejercicio y baños de agua fría. Evitar: discusiones y compromisos importantes.",
    color:     "#ef4444",
    // Triángulo equilátero rojo apuntando arriba — símbolo tradicional del Fuego
    svg: `<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <polygon points="50,10 90,84 10,84"
        fill="#3a0a0a" stroke="#ef4444" stroke-width="3" stroke-linejoin="round"/>
      <polygon points="50,26 74,72 26,72"
        fill="#5a1010" stroke="#ef4444" stroke-width="1" opacity="0.5" stroke-linejoin="round"/>
      <polygon points="50,44 62,66 38,66"
        fill="#ef4444" opacity="0.7" stroke-linejoin="round"/>
    </svg>`,
  },
  {
    nombre:    "PRITHVI",
    elemento:  "Tierra",
    cualidades:"",
    consejo:   "Favorable: negocios, amor y celebraciones. Todo lo iniciado aquí triunfa.",
    color:     "#f59e0b",
    // Cuadrado amarillo — símbolo tradicional de la Tierra
    svg: `<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="12" y="12" width="76" height="76"
        fill="#2a1a00" stroke="#f59e0b" stroke-width="3"/>
      <rect x="26" y="26" width="48" height="48"
        fill="#3d2600" stroke="#f59e0b" stroke-width="1" opacity="0.5"/>
      <rect x="38" y="38" width="24" height="24"
        fill="#f59e0b" opacity="0.75"/>
    </svg>`,
  },
  {
    nombre:    "APAS",
    elemento:  "Agua",
    cualidades:"",
    consejo:   "Favorable: compras y negocios. Las lluvias que comienzan ahora serán largas.",
    color:     "#cbd5e1",
    // Media luna con puntas hacia arriba — símbolo tradicional del Agua
    svg: `<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M 15,62 A 38,38 0 0,1 85,62 Z"
        fill="#1a2030" stroke="#cbd5e1" stroke-width="3" stroke-linejoin="round"/>
      <path d="M 26,62 A 26,26 0 0,1 74,62 Z"
        fill="#253045" stroke="#cbd5e1" stroke-width="1" opacity="0.5" stroke-linejoin="round"/>
      <path d="M 36,62 A 16,16 0 0,1 64,62 Z"
        fill="#cbd5e1" opacity="0.7" stroke-linejoin="round"/>
    </svg>`,
  },
];

const DURACION_MIN = 24;
let amanecerMinutos = null; // se carga desde API

// ── API de amanecer (sunrise-sunset.org — gratuita, sin key) ──
async function cargarAmanecer() {
  try {
    const hoy = new Date();
    const fecha = `${hoy.getFullYear()}-${String(hoy.getMonth()+1).padStart(2,'0')}-${String(hoy.getDate()).padStart(2,'0')}`;
    const url = `https://api.sunrise-sunset.org/json?lat=14.6349&lng=-90.5069&date=${fecha}&formatted=0`;
    const res  = await fetch(url);
    const data = await res.json();
    if (data.status === 'OK') {
      // La API devuelve UTC — restar 6h explicitamente para Guatemala
      const utcMs = new Date(data.results.sunrise).getTime();
      const localDate = new Date(utcMs - 6 * 60 * 60 * 1000);
      const hNum = localDate.getUTCHours();
      const mNum = localDate.getUTCMinutes();
      const sNum = localDate.getUTCSeconds();
      amanecerMinutos = hNum * 60 + mNum + sNum / 60;
      const h = String(hNum).padStart(2,'0');
      const m = String(mNum).padStart(2,'0');
      document.getElementById('amanecer').textContent = `☀  Amanecer ${h}:${m}  ·  Guatemala City`;
    } else {
      usarAmanecerLocal();
    }
  } catch (e) {
    usarAmanecerLocal();
  }
}

// Fallback si no hay internet
function usarAmanecerLocal() {
  const hoy = new Date();
  const dia = Math.floor((hoy - new Date(hoy.getFullYear(), 0, 0)) / 86400000);
  const B = (360 / 365) * (dia - 81) * Math.PI / 180;
  const decl = 23.45 * Math.sin(B) * Math.PI / 180;
  const lat  = 14.6349 * Math.PI / 180;
  const HA   = Math.acos(-Math.tan(lat) * Math.tan(decl)) * 180 / Math.PI;
  amanecerMinutos = (12 - HA / 15) * 60;
  const h = Math.floor(amanecerMinutos / 60);
  const m = Math.floor(amanecerMinutos % 60);
  document.getElementById('amanecer').textContent =
    `☀  Amanecer ~${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}  ·  Guatemala City`;
}

// ── Tatwa actual ──────────────────────────────────────────────
let ultimoIdx = -1;

function getTatwaActual() {
  const ahora    = new Date();
  const minDia   = ahora.getHours() * 60 + ahora.getMinutes() + ahora.getSeconds() / 60;
  const amMin    = amanecerMinutos ?? 5 * 60 + 50; // fallback 5:50
  const ciclo    = 5 * DURACION_MIN;

  let delta = (minDia - amMin) % ciclo;
  if (delta < 0) delta += ciclo;

  const idx        = Math.floor(delta / DURACION_MIN) % 5;
  const minEnTatwa = delta % DURACION_MIN;
  let segsRest     = Math.round((DURACION_MIN - minEnTatwa) * 60 - ahora.getSeconds());
  if (segsRest < 0) segsRest += DURACION_MIN * 60;
  const progreso   = minEnTatwa / DURACION_MIN;

  return { tatwa: TATWAS[idx], idx, segsRest, progreso, ahora };
}

// ── Helpers ───────────────────────────────────────────────────
const DIAS  = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
const MESES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const pad   = n => String(n).padStart(2,'0');

// ── Render ────────────────────────────────────────────────────
function render() {
  const { tatwa, idx, segsRest, progreso, ahora } = getTatwaActual();

  document.documentElement.style.setProperty('--current', tatwa.color);

  document.getElementById('hora').textContent =
    `${pad(ahora.getHours())}:${pad(ahora.getMinutes())}:${pad(ahora.getSeconds())}`;
  document.getElementById('fecha').textContent =
    `${DIAS[ahora.getDay()]}, ${ahora.getDate()} ${MESES[ahora.getMonth()]} ${ahora.getFullYear()}`;

  // Símbolo — solo cambiar si cambió el tatwa
  if (idx !== ultimoIdx) {
    const wrap = document.getElementById('simboloWrap');
    // Remover SVG anterior si existe
    const oldSvg = wrap.querySelector('svg');
    if (oldSvg) oldSvg.remove();

    const tmp = document.createElement('div');
    tmp.innerHTML = tatwa.svg;
    const svgEl = tmp.querySelector('svg');
    svgEl.classList.add('cambio');
    wrap.appendChild(svgEl);

    // Actualizar anillos
    wrap.querySelectorAll('.anillo, .anillo2').forEach(el => {
      el.style.borderColor = `color-mix(in srgb, ${tatwa.color} 18%, transparent)`;
    });

    ultimoIdx = idx;
  }

  document.getElementById('nombre').textContent    = tatwa.nombre;
  document.getElementById('elemento').textContent  = tatwa.elemento;
  document.getElementById('cualidades').textContent = tatwa.cualidades;
  document.getElementById('consejo').textContent   = tatwa.consejo;

  const mins = Math.floor(segsRest / 60);
  const segs = segsRest % 60;
  document.getElementById('restante').textContent = `${pad(mins)}m ${pad(segs)}s`;
  document.getElementById('progFill').style.width = `${progreso * 100}%`;
}

// ── Recarga el amanecer cada día a medianoche ─────────────────
function programarRecargaDiaria() {
  const ahora     = new Date();
  const manana    = new Date(ahora);
  manana.setDate(ahora.getDate() + 1);
  manana.setHours(0, 1, 0, 0);
  const msHastaMedianoche = manana - ahora;
  setTimeout(() => {
    cargarAmanecer();
    programarRecargaDiaria();
  }, msHastaMedianoche);
}

// ── Inicio ────────────────────────────────────────────────────
cargarAmanecer();
programarRecargaDiaria();
render();
setInterval(render, 1000);
</script>

<script>
// Registrar Service Worker para modo offline
if ('serviceWorker' in navigator) {
  const swCode = `
    self.addEventListener('install', e => self.skipWaiting());
    self.addEventListener('activate', e => e.waitUntil(clients.claim()));
    self.addEventListener('fetch', e => {
      e.respondWith(fetch(e.request).catch(() => new Response('')));
    });
  `;
  const blob = new Blob([swCode], {type: 'application/javascript'});
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl);
}
</script>
</body>
</html>
